<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRISM - Predictive Risk Intelligence & Surveillance Monitor</title>
    <meta name="description" content="Air-gapped predictive network fault analytics powered by LSTM and local LLM. Built for sovereign Indian infrastructure." />
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body {
        font-family: 'Inter', sans-serif;
        background: #F8FAFC;
        color: #1E293B;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Custom scrollbars */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #F1F5F9; }
      ::-webkit-scrollbar-thumb {
        background: #CBD5E1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94A3B8;
      }
      /* Selection color */
      ::selection {
        background: rgba(30, 64, 175, 0.15);
        color: #1E293B;
      }
      /* Textarea placeholder */
      textarea::placeholder { color: #94A3B8; }
      /* Button reset */
      button { font-family: 'Inter', sans-serif; }

      /* Responsive Styles */
      @media (max-width: 768px) {
        .responsive-header {
          flex-direction: column !important;
          height: auto !important;
          padding: 16px !important;
          gap: 16px !important;
        }
        .header-center-strip {
          flex-wrap: wrap !important;
          justify-content: center !important;
        }
        .header-controls {
          flex-wrap: wrap !important;
          justify-content: center !important;
        }
        .diff-strip {
          flex-direction: column !important;
          padding: 16px !important;
          gap: 16px !important;
        }
        .diff-item {
          border-right: none !important;
          border-bottom: 1px solid #E2E8F0 !important;
          padding-bottom: 12px !important;
        }
        .diff-item:last-child {
          border-bottom: none !important;
          padding-bottom: 0 !important;
        }
        .panels-container {
          flex-direction: column !important;
          overflow-y: auto !important;
        }
        .panel-col {
          width: 100% !important;
          border-right: none !important;
          border-bottom: 4px solid #E2E8F0 !important;
          flex: none !important;
          height: auto !important;
        }
        .panel-copilot {
          min-height: 500px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
